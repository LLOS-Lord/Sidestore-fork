name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install Tools
        run: |
          brew install mint xcbeautify
          mint install yonaskolb/XcodeGen

      - name: Prepare Sources
        run: |
          mkdir -p Sources/SideLoader
          mv *.swift Sources/SideLoader/ 2>/dev/null || true
          cat > Sources/SideLoader/main.swift << 'EOF'
          import SwiftUI

          @main
          struct SideLoaderApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          cat > Package.swift << 'EOF'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "SideLoader",
              platforms: [.iOS(.v15)],
              products: [.library(name: "SideLoader", targets: ["SideLoader"])],
              targets: [.target(name: "SideLoader", path: "Sources/SideLoader")]
          )
          EOF

      - name: Generate Xcode Project
        run: |
          cat > project.yml << EOF
          name: SideLoader
          platforms:
            iOS: 15.0
          targets:
            SideLoader:
              type: application
              platform: iOS
              sources:
                - path: Sources
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.sideloader.app
                INFOPLIST_FILE: Sources/SideLoader/Info.plist
                SWIFT_VERSION: 5.0
          EOF

          mkdir -p Sources/SideLoader
          cat > Sources/SideLoader/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key><string>com.sideloader.app</string>
              <key>CFBundleName</key><string>SideLoader</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UIApplicationSceneManifest</key>
              <dict><key>UIApplicationSupportsMultipleScenes</key><false/></dict>
          </dict>
          </plist>
          EOF

          xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project SideLoader.xcodeproj \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify

      - name: Prepare & Package IPA
        run: |
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          echo "XCARCHIVE: $XCARCHIVE"

          APP_PATH=$(find "$XCARCHIVE" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found!"
            ls -R build
            exit 1
          fi

          echo "✅ App found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          ls -lh SideLoader.ipa
          echo "✅ IPA created successfully!"
