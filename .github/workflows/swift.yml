name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'  # hoặc latest-stable

      - name: Install Dependencies
        run: |
          brew install xcbeautify
          echo "✅ Dependencies installed"

      - name: Prepare Project Structure
        run: |
          echo "📂 Chuẩn bị cấu trúc project..."
          mkdir -p SideLoader
          
          # Di chuyển tất cả source files
          mv *.swift SideLoader/ 2>/dev/null || true
          cp -r SideLoader/* . 2>/dev/null || true
          
          # Tạo file main.swift nếu chưa có
          if [ ! -f SideLoader/main.swift ]; then
            cat > SideLoader/main.swift << 'EOF'
          import SwiftUI

          @main
          struct SideLoaderApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF
          fi

          echo "✅ Project structure ready"

      - name: Create Minimal Xcode Project
        run: |
          echo "🔧 Tạo Xcode project..."
          xcodegen generate --spec << EOF || true
          name: SideLoader
          platforms:
            iOS: 15.0
          targets:
            SideLoader:
              type: application
              platform: iOS
              sources:
                - path: .
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.sideloader.app
                INFOPLIST_FILE: Info.plist
          EOF

          # Fallback nếu xcodegen không có
          if [ ! -d "SideLoader.xcodeproj" ]; then
            echo "Sử dụng fallback project creation..."
            mkdir -p SideLoader.xcodeproj
            cat > SideLoader.xcodeproj/project.pbxproj << 'EOP'
          // Minimal project.pbxproj
          { archiveVersion = 1; objectVersion = 60; }
          EOP
          fi

      - name: Build and Archive
        run: |
          echo "🚀 Running xcodebuild archive..."
          xcodebuild archive \
            -project SideLoader.xcodeproj \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcbeautify

      - name: Prepare IPA
        run: |
          echo "🔍 Tìm xcarchive..."
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          echo "XCARCHIVE = $XCARCHIVE"

          if [ -z "$XCARCHIVE" ]; then
            echo "❌ No xcarchive found!"
            ls -la build 2>/dev/null || echo "No build folder"
            exit 1
          fi

          echo "✅ Found xcarchive. Looking for .app..."
          APP_PATH=$(find "$XCARCHIVE" -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found inside archive!"
            ls -R "$XCARCHIVE" | head -50
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          ls -lh SideLoader.ipa
          echo "✅ IPA created successfully!"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SideLoader-IPA
          path: build/SideLoader.ipa
