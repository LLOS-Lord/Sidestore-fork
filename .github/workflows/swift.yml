name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Dependencies
        run: |
          brew install ldid xcbeautify
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios

      - name: Auto Create Xcode Project
        run: |
          echo "🔧 Tự động tạo Xcode Project..."

          # Tạo thư mục project
          mkdir -p SideLoader

          # Di chuyển source files vào thư mục project
          mv *.swift SideLoader/ 2>/dev/null || true
          mv *.md SideLoader/ 2>/dev/null || true

          # Tạo Info.plist
          cat > SideLoader/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.sideloader.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>SideLoader</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

          # Tạo project.pbxproj đơn giản (minimal)
          mkdir -p SideLoader.xcodeproj
          cat > SideLoader.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
            archiveVersion = 1;
            classes = {};
            objectVersion = 60;
            objects = {
              /* Begin PBXBuildFile section */
              13B07FBC1A68108700A75B9A /* main.m in Sources */ = {isa = PBXBuildFile; fileRef = 13B07FB81A68108700A75B9A /* main.m */; };
              /* End PBXBuildFile section */

              /* Begin PBXFileReference section */
              13B07F961A68108700A75B9A /* SideLoader.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = SideLoader.app; sourceTree = BUILT_PRODUCTS_DIR; };
              /* End PBXFileReference section */

              /* Begin PBXNativeTarget section */
              13B07F971A68108700A75B9A /* SideLoader */ = {
                isa = PBXNativeTarget;
                buildConfigurationList = 13B07F9E1A68108700A75B9A /* Build configuration list for PBXNativeTarget "SideLoader" */;
                buildPhases = (
                  13B07F9C1A68108700A75B9A /* Resources */,
                  13B07F9D1A68108700A75B9A /* Sources */,
                );
                buildRules = ();
                dependencies = ();
                name = SideLoader;
                productName = SideLoader;
                productReference = 13B07F961A68108700A75B9A /* SideLoader.app */;
                productType = "com.apple.product-type.application";
              };
              /* End PBXNativeTarget section */

              /* Begin PBXProject section */
              83C7F9D81A6A1E0A00A75B9A /* Project object */ = {
                isa = PBXProject;
                attributes = {
                  LastUpgradeCheck = 1400;
                };
                buildConfigurationList = 83C7F9DB1A6A1E0A00A75B9A /* Build configuration list for PBXProject "SideLoader" */;
                compatibilityVersion = "Xcode 3.2";
                developmentRegion = en;
                hasScannedForEncodings = 0;
                knownRegions = (
                  en,
                  Base,
                );
                mainGroup = 83C7F9D71A6A1E0A00A75B9A;
                productRefGroup = 83C7F9E11A6A1E0A00A75B9A /* Products */;
                projectDirPath = "";
                projectRoot = "";
                targets = (
                  13B07F971A68108700A75B9A /* SideLoader */,
                );
              };
              /* End PBXProject section */
            };
            rootObject = 83C7F9D81A6A1E0A00A75B9A /* Project object */;
          }
          EOF

          echo "✅ Đã tạo Xcode project cơ bản"

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project SideLoader.xcodeproj \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcbeautify

      - name: Prepare IPA
        run: |
          echo "🔍 Đang tìm .app..."
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          APP_PATH=$(find "$XCARCHIVE/Products/Applications" -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Không tìm thấy .app"
            exit 1
          fi

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          echo "✅ IPA đã tạo: build/SideLoader.ipa"
          ls -lh SideLoader.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SideLoader-IPA
          path: build/SideLoader.ipa
