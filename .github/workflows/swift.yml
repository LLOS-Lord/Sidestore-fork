name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install Tools
        run: brew install xcbeautify

      - name: Setup Swift Package
        run: |
          echo "📦 Tạo Swift Package structure..."
          mkdir -p Sources/SideLoader
          
          # Di chuyển source files
          mv *.swift Sources/SideLoader/ 2>/dev/null || true
          
          # Tạo entry point
          cat > Sources/SideLoader/main.swift << 'EOF'
          import SwiftUI

          @main
          struct SideLoaderApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          # Info.plist
          mkdir -p SideLoader
          cat > SideLoader/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key><string>com.sideloader.app</string>
              <key>CFBundleName</key><string>SideLoader</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UIApplicationSceneManifest</key>
              <dict><key>UIApplicationSupportsMultipleScenes</key><false/></dict>
          </dict>
          </plist>
          EOF

          # Package.swift
          cat > Package.swift << 'EOF'
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "SideLoader",
              platforms: [.iOS(.v15)],
              products: [.library(name: "SideLoader", targets: ["SideLoader"])],
              targets: [
                  .target(
                      name: "SideLoader",
                      path: "Sources/SideLoader"
                  )
              ]
          )
          EOF

      - name: Build Archive
        run: |
          echo "🚀 Building with xcodebuild..."
          xcodebuild archive \
            -workspace . \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcbeautify || {
              echo "Trying alternative build method..."
              xcodebuild -create-xcframework -framework build -output build || true
            }

      - name: Prepare IPA
        run: |
          echo "🔍 Finding artifacts..."
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          if [ -z "$XCARCHIVE" ]; then
            echo "❌ No xcarchive"
            ls -la
            exit 1
          fi

          APP_PATH=$(find "$XCARCHIVE" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Trying to find app elsewhere..."
            APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ Still no .app found"
            ls -R build 2>/dev/null || true
            exit 1
          fi

          echo "✅ App found at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          ls -lh SideLoader.ipa
          echo "✅ Success!"
