name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Dependencies
        run: |
          brew install ldid xcbeautify
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios

      - name: Build and Archive
        run: |
          # Sử dụng xcodebuild archive thay vì build-for-testing để tạo .app hoàn chỉnh
          xcodebuild archive \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcbeautify

      - name: Prepare IPA
        run: |
          mkdir -p build/Payload
          cp -r build/SideLoader.xcarchive/Products/Applications/SideLoader.app build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SideLoader-IPA
          path: build/SideLoader.ipa

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: SideLoader-IPA

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: SideLoader.ipa
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
