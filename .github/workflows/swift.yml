name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install Tools
        run: brew install xcbeautify

      - name: Prepare Project
        run: |
          echo "📦 Chuẩn bị source code..."
          mkdir -p SideLoader/Sources/SideLoader
          
          # Di chuyển tất cả file Swift
          mv *.swift SideLoader/Sources/SideLoader/ 2>/dev/null || true
          
          # Tạo main.swift
          cat > SideLoader/Sources/SideLoader/main.swift << 'EOF'
          import SwiftUI

          @main
          struct SideLoaderApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          # Tạo Info.plist
          cat > SideLoader/Sources/SideLoader/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key><string>com.sideloader.app</string>
              <key>CFBundleName</key><string>SideLoader</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key><false/>
              </dict>
          </dict>
          </plist>
          EOF

          echo "✅ Project files prepared"

      - name: Create Minimal Xcode Project
        run: |
          mkdir -p SideLoader.xcodeproj
          echo "Creating minimal project.pbxproj..."
          cat > SideLoader.xcodeproj/project.pbxproj << 'EOP'
          {
            "archiveVersion": "1",
            "objectVersion": "60",
            "objects": {}
          }
          EOP

      - name: Build and Archive
        run: |
          echo "🚀 Building archive..."
          xcodebuild archive \
            -project SideLoader.xcodeproj \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcbeautify || echo "Build completed with warnings"

      - name: Prepare IPA
        run: |
          echo "🔍 Finding .app..."
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          if [ -z "$XCARCHIVE" ]; then
            echo "❌ No xcarchive found"
            ls -la
            exit 1
          fi

          APP_PATH=$(find "$XCARCHIVE" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found in archive"
            ls -R "$XCARCHIVE" || true
            exit 1
          fi

          echo "✅ Found: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SideLoader.ipa Payload/
          ls -lh SideLoader.ipa
          echo "✅ IPA created!"
