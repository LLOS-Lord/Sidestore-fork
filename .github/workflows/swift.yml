name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Dependencies
        run: |
          brew install ldid xcbeautify
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios

      - name: Auto Create Xcode Project (nếu chưa có)
        run: |
          echo "🔧 Kiểm tra và tạo Xcode Project..."
          if [ ! -d "*.xcodeproj" ] && [ ! -d "SideLoader.xcodeproj" ]; then
            echo "Tạo project cơ bản..."
            mkdir -p SideLoader SideLoader.xcodeproj
            mv *.swift SideLoader/ 2>/dev/null || true
            
            cat > SideLoader/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleExecutable</key><string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key><string>com.sideloader.app</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>SideLoader</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
          </dict>
          </plist>
          EOF
            echo "✅ Đã tạo project cơ bản"
          fi

      - name: Build and Archive
        run: |
          echo "🚀 Bắt đầu build..."
          xcodebuild archive \
            -project SideLoader.xcodeproj \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcbeautify || echo "⚠️ Build có lỗi, kiểm tra log"

      - name: Prepare IPA
        run: |
          echo "🔍 Tìm kiếm .xcarchive và .app..."

          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          if [ -z "$XCARCHIVE" ]; then
            echo "❌ Không tìm thấy .xcarchive"
            ls -la
            exit 1
          fi
          echo "✅ Tìm thấy xcarchive: $XCARCHIVE"

          APP_PATH=""
          if [ -d "$XCARCHIVE/Products/Applications" ]; then
            APP_PATH=$(find "$XCARCHIVE/Products/Applications" -name "*.app" -type d | head -n 1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$XCARCHIVE" -name "*.app" -type d | head -n 1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ Không tìm thấy file .app!"
            echo "📂 Nội dung xcarchive:"
            ls -R "$XCARCHIVE" 2>/dev/null || true
            echo "🔎 Tất cả .app:"
            find . -name "*.app" || true
            exit 1
          fi

          echo "✅ Đã tìm thấy app tại: $APP_PATH"

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          
          echo "📦 Đóng gói IPA..."
          cd build && zip -r SideLoader.ipa Payload/
          
          echo "🎉 HOÀN THÀNH!"
          echo "✅ IPA đã được tạo tại: build/SideLoader.ipa"
          ls -lh SideLoader.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SideLoader-IPA
          path: build/SideLoader.ipa
