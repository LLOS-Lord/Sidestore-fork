name: iOS Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build SideLoader App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Dependencies
        run: |
          brew install ldid xcbeautify
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios

      - name: Build and Archive
        run: |
          ls -R *.xcodeproj || echo "No xcodeproj found"
          
          # Build với fallback scheme
          xcodebuild archive \
            -scheme SideLoader \
            -archivePath build/SideLoader.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcbeautify || {
              echo "❌ Build thất bại với scheme SideLoader. Đang thử tìm scheme khác..."
              SCHEME=$(xcodebuild -list -json | python3 -c "import sys, json; print(json.load(sys.stdin)['project']['schemes'][0])" 2>/dev/null || echo "SideLoader")
              echo "🔄 Thử build với scheme: $SCHEME"
              xcodebuild archive \
                -scheme "$SCHEME" \
                -archivePath build/SideLoader.xcarchive \
                -destination 'generic/platform=iOS' \
                -configuration Release \
                CODE_SIGNING_ALLOWED=NO \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGN_IDENTITY="" \
                AD_HOC_CODE_SIGNING_ALLOWED=YES \
                | xcbeautify
            }

      - name: Prepare IPA
        run: |
          echo "🔍 Đang tìm kiếm file .app..."

          APP_PATH=""

          # Cách 1: Tìm qua .xcarchive
          XCARCHIVE=$(find . -name "*.xcarchive" -type d | head -n 1)
          if [ -n "$XCARCHIVE" ]; then
            echo "✅ Tìm thấy .xcarchive tại: $XCARCHIVE"
            APP_PATH=$(find "$XCARCHIVE/Products/Applications" -name "*.app" -type d | head -n 1)
          fi

          # Cách 2: Fallback tìm trực tiếp
          if [ -z "$APP_PATH" ]; then
            echo "⚠️ Không tìm thấy qua .xcarchive, thử tìm .app trực tiếp..."
            APP_PATH=$(find . -name "*.app" -type d ! -path "*/Pods/*" ! -path "*/DerivedData/*" ! -path "*/.git/*" | head -n 1)
          fi

          # Kiểm tra kết quả
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ LỖI: Không tìm thấy bất kỳ file .app nào để đóng gói IPA."
            echo "📂 Cấu trúc thư mục:"
            ls -la
            echo "🔎 Tìm tất cả .xcarchive và .app:"
            find . -name "*.xcarchive" -o -name "*.app" | head -30
            exit 1
          fi

          echo "✅ Đã xác định app tại: $APP_PATH"

          # Tạo IPA
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/

          echo "📦 Đang đóng gói IPA..."
          cd build && zip -r SideLoader.ipa Payload/
          echo "✅ IPA đã được tạo tại: build/SideLoader.ipa"
          ls -lh SideLoader.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SideLoader-IPA
          path: build/SideLoader.ipa

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: SideLoader-IPA

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: SideLoader.ipa
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
